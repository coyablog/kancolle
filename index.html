<style>
  @import url(https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100..900&family=Noto+Serif+TC:wght@200..900&display=swap);
  *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
  }
  body {
      font-family: "Noto Sans TC", sans-serif;
      background: #0d1520;
      color: #dde8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6% 4%;
  }
  .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 3%;
      width: 100%;
      max-width: 560px;
  }
  .tool-card {
      position: relative;
      background: #131e30;
      border: 1px solid rgba(74, 143, 191, 0.2);
      border-top: 2px solid #c0392b;
      border-radius: 5px;
      padding: 10%;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 10%;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      overflow: hidden;
  }
  .tool-card::before, .tool-card::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      border-color: #c0392b;
      border-style: solid;
      opacity: 0.5;
      transition: opacity 0.2s;
  }
  .tool-card::before {
      bottom: 8px;
      right: 8px;
      border-width: 0 1.5px 1.5px 0;
  }
  .tool-card::after {
      bottom: 8px;
      left: 8px;
      border-width: 0 0 1.5px 1.5px;
  }
  .tool-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 36px rgba(0, 0, 0, 0.7);
      border-color: rgba(74, 143, 191, 0.45);
      border-top-color: #c0392b;
  }
  .tool-card:hover::before, .tool-card:hover::after {
      opacity: 0.8;
  }
  .tool-name {
      font-family: "Noto Serif TC", serif;
      font-size: 20px;
      font-weight: bold;
      color: #c8a84b;
      letter-spacing: 0.08em;
  }
  .tool-desc {
      font-size: 13px;
      color: #566a80;
      letter-spacing: 0.04em;
      line-height: 1.75;
  }
</style>
</head>
<body>
<div class="tools-grid">

<a class="tool-card" href="daihatsu_tank.html" target="_blank" rel="noopener noreferrer">
<div class="tool-name">賽艇人速查</div>
<div class="tool-desc">可搭載大發動艇或內火艇的艦娘一覽，支援篩選。</div>
</a>

<a class="tool-card" href="ranking_tool.html" target="_blank" rel="noopener noreferrer">
<div class="tool-name">戰果計算</div>
<div class="tool-desc">計算每日、每場所需刷新量，並顯示本月完成進度。</div>
</a>

</div>
</body>
